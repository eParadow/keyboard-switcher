appId: com.keyboardswitcher.app
productName: Keyboard Switcher
copyright: Copyright (c) 2026

directories:
  output: dist/installer
  buildResources: assets

# On inclut le code main + preload, les assets, le package.json et le
# bundle renderer produit par Vite. Le source renderer (src/renderer/**)
# est exclu car il est deja transpile dans dist/renderer/. Les PoCs et
# la doc technique ne sont pas packages.
files:
  - src/main/**
  - src/preload/**
  - assets/**
  - package.json
  - dist/renderer/**
  - "!src/renderer/**"
  - "!poc/**"
  - "!docs/**"
  - "!scripts/**"
  - "!**/*.map"

asar: true
# koffi et active-win embarquent des binaires natifs qui doivent rester
# extractibles du .asar au runtime, sinon Node ne peut pas les require().
asarUnpack:
  - "**/koffi/**"
  - "**/active-win/**"

# On desactive le rebuild natif automatique : ni koffi ni active-win n'en
# ont besoin sur Windows (koffi ships ses binaires prebuilt par version
# de Node/Electron ; active-win v8 ship un `main.exe` precompile). Sans
# cette option, electron-builder invoque node-gyp sur le binding.gyp
# (macOS) d'active-win et echoue si Visual Studio Build Tools n'est pas
# installe.
npmRebuild: false
buildDependenciesFromSource: false

win:
  target:
    - target: nsis
      arch:
        - x64
  icon: assets/app-icon.ico
  # Nom stable pour le lien permanent GitHub Releases (latest/download/...).
  artifactName: Keyboard-Switcher-Setup-${arch}.${ext}

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Keyboard Switcher

# Pas d'auto-update pour l'instant : on n'a pas de serveur de release.
publish: null
